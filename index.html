<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador UIDE - Versión Robusta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001a33; color: white; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #003366; text-align: center; margin-top: 0; }
        .input-box { border: 2px dashed #003366; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #f8f9fa; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #b8962d; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #9a7d25; }
        label { font-weight: bold; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador UIDE</h2>
    
    <div class="input-box">
        <label>1. Archivo Excel:</label>
        <input type="file" id="excelIn" accept=".xlsx" style="width:100%; margin-top:5px;">
    </div>

    <div class="input-box">
        <label>2. Plantilla Word:</label>
        <input type="file" id="wordIn" accept=".docx" style="width:100%; margin-top:5px;">
    </div>

    <div id="controls" style="display:none">
        <label>Carrera:</label>
        <select id="selC" onchange="filterD()"></select>
        
        <label>Docente:</label>
        <select id="selD"></select>
        
        <button onclick="process()">GENERAR INFORME LLENO</button>
    </div>
</div>

<script>
let excelData = [];
let wordBuffer = null;

document.getElementById('excelIn').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
        const ws = wb.Sheets["BD"] || wb.Sheets[wb.SheetNames[0]];
        excelData = XLSX.utils.sheet_to_json(ws);
        
        const cats = [...new Set(excelData.map(r => r.Escuela).filter(Boolean))].sort();
        document.getElementById('selC').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        filterD();
        checkReady();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

document.getElementById('wordIn').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { wordBuffer = ev.target.result; checkReady(); };
    reader.readAsArrayBuffer(e.target.files[0]);
};

function checkReady() { if(excelData.length && wordBuffer) document.getElementById('controls').style.display = 'block'; }

function filterD() {
    const c = document.getElementById('selC').value;
    const docs = excelData.filter(r => r.Escuela === c).map(r => r.Docente).sort();
    document.getElementById('selD').innerHTML = docs.map(d => `<option value="${d}">${d}</option>`).join('');
}

function process() {
    const name = document.getElementById('selD').value;
    const row = excelData.find(r => r.Docente === name);
    const score = (parseFloat(row.Promedio) * 20).toFixed(2);

    try {
        const zip = new PizZip(wordBuffer);
        const doc = new window.docxtemplater(zip, { 
            paragraphLoop: true, 
            linebreaks: true,
            // ESTO LIMPIA LAS ETIQUETAS CORRUPTAS DE WORD
            delimiters: {start: '{{', end: '}}'} 
        });

        doc.setData({
            docente: row.Docente,
            carrera: row.Escuela,
            ev100: score,
            total100: score,
            escala: score >= 85 ? "Excelente" : (score >= 70 ? "Muy buena" : "Regular")
        });

        doc.render();
        const out = doc.getZip().generate({type: "blob"});
        saveAs(out, `Informe_${name.replace(/ /g, '_')}.docx`);
    } catch (e) {
        console.error(e);
        alert("Error al llenar: Asegúrate de que las etiquetas en Word sean {{docente}}, {{carrera}}, {{ev100}} y {{total100}}.");
    }
}
</script>
</body>
</html>

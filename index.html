<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Informes UIDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001a33; color: white; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        h2 { color: #003366; text-align: center; margin-top: 0; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #003366; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .status { font-size: 12px; text-align: center; margin-top: 15px; padding: 10px; border-radius: 4px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador UIDE</h2>
    <div id="status" class="status">Cargando base de datos...</div>
    
    <label>1. Seleccione Carrera:</label>
    <select id="selCarrera" onchange="cargarDocentes()">
        <option value="">Esperando datos...</option>
    </select>

    <label>2. Seleccione Docente:</label>
    <select id="selDocente">
        <option value="">Seleccione carrera primero</option>
    </select>

    <button onclick="generarInforme()">GENERAR Y DESCARGAR WORD</button>
</div>

<script>
let rawData = [];

// Función para leer el Excel desde GitHub
async function inicializar() {
    const status = document.getElementById("status");
    try {
        const response = await fetch("Evaluación docente individual.xlsx");
        if (!response.ok) throw new Error("No se encontró el archivo Excel en el repositorio.");
        
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        
        // Buscamos la hoja "BD" que es la que tiene los datos limpios
        const sheet = workbook.Sheets["BD"] || workbook.Sheets[workbook.SheetNames[0]];
        rawData = XLSX.utils.sheet_to_json(sheet);

        // Llenar select de carreras
        const carreras = [...new Set(rawData.map(d => d.Escuela).filter(Boolean))].sort();
        const selC = document.getElementById("selCarrera");
        selC.innerHTML = '<option value="">-- Seleccione Carrera --</option>';
        carreras.forEach(c => selC.innerHTML += `<option value="${c}">${c}</option>`);

        status.innerText = "✅ Base de datos lista";
        status.className = "status success";
    } catch (e) {
        status.innerText = "❌ Error: " + e.message;
        status.className = "status error";
    }
}

function cargarDocentes() {
    const carrera = document.getElementById("selCarrera").value;
    const selD = document.getElementById("selDocente");
    selD.innerHTML = '<option value="">-- Seleccione Docente --</option>';
    
    const docentes = [...new Set(rawData.filter(d => d.Escuela === carrera).map(d => d.Docente))].sort();
    docentes.forEach(d => selD.innerHTML += `<option value="${d}">${d}</option>`);
}

async function generarInforme() {
    const docenteNombre = document.getElementById("selDocente").value;
    const carreraNombre = document.getElementById("selCarrera").value;
    const data = rawData.find(d => d.Docente === docenteNombre && d.Escuela === carreraNombre);

    if (!data) return alert("Seleccione Docente y Carrera");

    try {
        // Cargar Plantilla Word
        const resp = await fetch("GA-EMA-IN-25102025 INFORME EVALUACION DOCENTE .docx");
        const arrayBuffer = await resp.arrayBuffer();
        const zip = new PizZip(arrayBuffer);
        const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

        // Convertir promedio (base 5) a base 100
        const notaFinal = (parseFloat(data.Promedio) * 20).toFixed(2);

        // Reemplazar etiquetas en el Word
        doc.render({
            docente: data.Docente,
            carrera: data.Escuela,
            ev100: notaFinal,
            gpr100: "100.00",
            inv100: "0.00",
            vin100: "0.00",
            ges100: "100.00",
            bi100: "100.00",
            total100: notaFinal,
            escala: notaFinal >= 70 ? "Muy buena" : "Regular"
        });

        const out = doc.getZip().generate({ type: "blob" });
        saveAs(out, `Informe_${docenteNombre}.docx`);

    } catch (err) {
        alert("Error al procesar el Word: " + err.message);
    }
}

window.onload = inicializar;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador UIDE - Versión Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #002147; color: #333; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 450px; }
        h2 { color: #003366; text-align: center; border-bottom: 4px solid #b8962d; padding-bottom: 10px; margin-top: 0; }
        .input-group { background: #f0f4f8; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        label { font-weight: bold; color: #003366; display: block; margin-bottom: 8px; font-size: 0.9em; }
        select, button, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #b8962d; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #8e7423; transform: scale(1.02); }
        .status { text-align: center; font-size: 0.85em; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador de Informes</h2>
    
    <div class="input-group">
        <label>1. Subir Excel (Datos P1-P8):</label>
        <input type="file" id="uploadExcel" accept=".xlsx">
    </div>

    <div class="input-group">
        <label>2. Subir Plantilla Word:</label>
        <input type="file" id="uploadWord" accept=".docx">
    </div>

    <div id="controls" style="display:none">
        <div class="input-group">
            <label>Seleccionar Carrera:</label>
            <select id="selCarrera" onchange="filterDocentes()"></select>
            
            <label style="margin-top:15px">Seleccionar Docente:</label>
            <select id="selDocente"></select>
        </div>
        <button onclick="generateDoc()">DESCARGAR INFORME</button>
    </div>
    
    <div id="msg" class="status">Cargue los archivos para empezar</div>
</div>

<script>
    let rawData = [];
    let wordTemplate = null;

    // Leer Excel
    document.getElementById('uploadExcel').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            rawData = XLSX.utils.sheet_to_json(sheet);
            
            const carreras = [...new Set(rawData.map(r => r.Escuela).filter(Boolean))].sort();
            document.getElementById('selCarrera').innerHTML = '<option value="">-- Carrera --</option>' + 
                carreras.map(c => `<option value="${c}">${c}</option>`).join('');
            checkFiles();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    // Leer Word
    document.getElementById('uploadWord').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { wordTemplate = ev.target.result; checkFiles(); };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    function checkFiles() {
        if(rawData.length && wordTemplate) {
            document.getElementById('controls').style.display = 'block';
            document.getElementById('msg').innerHTML = "✅ Archivos cargados correctamente";
        }
    }

    function filterDocentes() {
        const carrera = document.getElementById('selCarrera').value;
        const docentes = [...new Set(rawData.filter(r => r.Escuela === carrera).map(r => r.Docente))].sort();
        document.getElementById('selDocente').innerHTML = docentes.map(d => `<option value="${d}">${d}</option>`).join('');
    }

    function generateDoc() {
        const docName = document.getElementById('selDocente').value;
        const carrera = document.getElementById('selCarrera').value;
        const items = rawData.filter(r => r.Docente === docName);

        // Mapear filas para la tabla {#asig}
        const asignaturas = items.map(m => ({
            n: m.Asignatura || m.Curso,
            p1: Number(m.P1 || 0).toFixed(2),
            p2: Number(m.P2 || 0).toFixed(2),
            p3: Number(m.P3 || 0).toFixed(2),
            p4: Number(m.P4 || 0).toFixed(2),
            p5: Number(m.P5 || 0).toFixed(2),
            p6: Number(m.P6 || 0).toFixed(2),
            p7: Number(m.P7 || 0).toFixed(2),
            p8: Number(m.P8 || 0).toFixed(2),
            pr: Number(m.Promedio || 0).toFixed(2)
        }));

        // Cálculos de promedios finales
        const sum = asignaturas.reduce((a, b) => a + parseFloat(b.pr), 0);
        const finalAvg = (sum / asignaturas.length);
        const score100 = (finalAvg * 20).toFixed(2);

        try {
            const zip = new PizZip(wordTemplate);
            const doc = new window.docxtemplater(zip, { 
                paragraphLoop: true, 
                linebreaks: true 
            });

            doc.render({
                docente: docName,
                carrera: carrera,
                asig: asignaturas, // Aquí se inyecta la tabla
                ev100: score100,
                total100: score100,
                escala: score100 >= 85 ? "Excelente" : (score100 >= 70 ? "Muy buena" : "Regular")
            });

            const out = doc.getZip().generate({type: "blob"});
            saveAs(out, `Informe_${docName}.docx`);
        } catch (e) {
            console.error(e);
            alert("Error: Asegúrese de que el Word use {#asig} ... {{/asig}} en la misma fila.");
        }
    }
</script>
</body>
</html>

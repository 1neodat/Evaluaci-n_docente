<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador UIDE - Test Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #001a33; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 10px; display: inline-block; width: 450px; text-align: left; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #003366; color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center">Panel de Control</h3>
    <label>1. Seleccionar Excel:</label>
    <input type="file" id="excel">
    
    <label>2. Seleccionar Word:</label>
    <input type="file" id="word">

    <div id="paso3" style="display:none">
        <label>3. Carrera:</label>
        <select id="selC" onchange="cambioCarrera()"></select>
        <label>4. Docente:</label>
        <select id="selD"></select>
        <button onclick="generar()">GENERAR AHORA</button>
    </div>
</div>

<script>
let excelJSON = [];
let wordRaw = null;

// Lector de Excel
document.getElementById('excel').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
        const nombreHoja = wb.SheetNames.includes("BD") ? "BD" : wb.SheetNames[0];
        excelJSON = XLSX.utils.sheet_to_json(wb.Sheets[nombreHoja]);
        
        const carreras = [...new Set(excelJSON.map(x => x.Escuela).filter(Boolean))].sort();
        document.getElementById('selC').innerHTML = carreras.map(c => `<option value="${c}">${c}</option>`).join('');
        cambioCarrera();
        mostrar();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

// Lector de Word
document.getElementById('word').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { wordRaw = ev.target.result; mostrar(); };
    reader.readAsArrayBuffer(e.target.files[0]);
};

function mostrar() { if(excelJSON.length > 0 && wordRaw) document.getElementById('paso3').style.display = 'block'; }

function cambioCarrera() {
    const c = document.getElementById('selC').value;
    const filtrados = excelJSON.filter(x => x.Escuela === c).map(x => x.Docente).sort();
    document.getElementById('selD').innerHTML = filtrados.map(d => `<option value="${d}">${d}</option>`).join('');
}

function generar() {
    const dName = document.getElementById('selD').value;
    const fila = excelJSON.find(f => f.Docente === dName);
    const notaBase100 = (parseFloat(fila.Promedio) * 20).toFixed(2);

    // ESTA ALERTA TE CONFIRMA SI EL CÓDIGO TIENE LOS DATOS
    alert(`Enlazando a ${dName}\nNota calculada: ${notaBase100}\n\nSi el Word sale vacío, revisa que tengas las llaves {{ }} en el documento.`);

    try {
        const zip = new PizZip(wordRaw);
        const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

        doc.render({
            docente: fila.Docente,
            carrera: fila.Escuela,
            ev100: notaBase100,
            total100: notaBase100,
            escala: notaBase100 >= 70 ? "Muy buena" : "Regular"
        });

        const out = doc.getZip().generate({type: "blob"});
        saveAs(out, `Informe_Final_${dName}.docx`);
    } catch (err) {
        console.error(err);
        alert("Error técnico al procesar el Word.");
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generar informe de evaluación docente</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }
    h1{
      font-size: 24px;
      margin-bottom: 16px;
    }
    .box{
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
    }
    label{
      display:block;
      font-weight:bold;
      margin: 10px 0 6px;
    }
    input[type="file"], input[type="text"]{
      width:100%;
      padding:8px;
      box-sizing:border-box;
    }
    button{
      padding:12px 18px;
      cursor:pointer;
      font-size:15px;
      margin-top: 14px;
      margin-right: 10px;
    }
    pre{
      background:#f7f7f7;
      border-radius:6px;
      padding:12px;
      white-space:pre-wrap;
      overflow:auto;
    }
  </style>
</head>
<body>

  <h1>Generar informe de evaluación docente</h1>

  <div class="box">
    <label for="excelFile">Excel de evaluación docente</label>
    <input type="file" id="excelFile" accept=".xlsx,.xls" />

    <label for="wordFile">Plantilla Word</label>
    <input type="file" id="wordFile" accept=".docx" />

    <label for="docenteInput">Docente</label>
    <input type="text" id="docenteInput" placeholder="Se llenará desde el Excel si existe" />

    <label for="carreraInput">Carrera</label>
    <input type="text" id="carreraInput" placeholder="Se llenará desde el Excel si existe" />

    <button id="btnLeerExcel">Leer Excel</button>
    <button id="btnProcesar">Procesar y descargar Word</button>
  </div>

  <div class="box">
    <strong>Estado</strong>
    <pre id="log">Esperando archivos...</pre>
  </div>

  <script>
    let cacheDatosExcel = null;

    function log(msg) {
      document.getElementById("log").textContent = msg;
    }

    function readFileAsArrayBuffer(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    function round2(n) {
      const num = Number(n);
      if (Number.isNaN(num)) return "";
      return num.toFixed(2).replace(".", ",");
    }

    function toNumber(n) {
      const num = Number(String(n).replace(",", "."));
      return Number.isNaN(num) ? 0 : num;
    }

    function escapeXml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getCell(row, index) {
      return String(row?.[index] ?? "").trim();
    }

    function findValueNextToLabel(rows, labels) {
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i] || [];
        for (let c = 0; c < row.length; c++) {
          const current = String(row[c] ?? "").trim();
          if (labels.includes(current)) {
            for (let k = c + 1; k < row.length; k++) {
              const val = String(row[k] ?? "").trim();
              if (val !== "") return val;
            }
          }
        }
      }
      return "";
    }

    function extraerDatosDesdeExcel(workbook) {
      const sheetName = "Eval docente individual";
      const ws = workbook.Sheets[sheetName];

      if (!ws) {
        throw new Error(`No existe la hoja "${sheetName}".`);
      }

      const rows = XLSX.utils.sheet_to_json(ws, {
        header: 1,
        raw: true,
        defval: ""
      });

      let docente = findValueNextToLabel(rows, ["Docente:", "Docente"]);
      let carrera = findValueNextToLabel(rows, ["Escuela:", "Escuela", "Carrera:", "Carrera"]);

      const cursos = [];

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i] || [];

        if (getCell(row, 2) === "Curso:" && getCell(row, 3) !== "") {
          const nombreCurso = getCell(row, 3);

          const valores = [];
          for (let j = i + 2; j <= i + 9; j++) {
            const r = rows[j] || [];
            const notaCursoElegido = r[15];
            const num = Number(notaCursoElegido);
            if (!Number.isNaN(num)) valores.push(num);
          }

          if (valores.length >= 8) {
            const p = valores.slice(0, 8);
            const promedio5 = p.reduce((a, b) => a + b, 0) / p.length;

            cursos.push({
              nombre: nombreCurso,
              p1n: p[0],
              p2n: p[1],
              p3n: p[2],
              p4n: p[3],
              p5n: p[4],
              p6n: p[5],
              p7n: p[6],
              p8n: p[7],
              promedioN: promedio5,
              p1: round2(p[0]),
              p2: round2(p[1]),
              p3: round2(p[2]),
              p4: round2(p[3]),
              p5: round2(p[4]),
              p6: round2(p[5]),
              p7: round2(p[6]),
              p8: round2(p[7]),
              promedio: round2(promedio5)
            });
          }
        }
      }

      if (!cursos.length) {
        throw new Error("No se encontraron cursos en la hoja 'Eval docente individual'.");
      }

      if (!docente) docente = "";
      if (!carrera) carrera = "";

      const promedioTodasAsignaturas5 =
        cursos.reduce((acc, c) => acc + c.promedioN, 0) / cursos.length;

      const promedioTotal100 = promedioTodasAsignaturas5 * 20;

      return {
        docente,
        carrera,
        cursos,
        promedioTodasAsignaturas5: round2(promedioTodasAsignaturas5),
        promedioTotal100: round2(promedioTotal100)
      };
    }

    function replaceAllSafe(text, search, replacement) {
      return text.split(search).join(replacement);
    }

    function reemplazarTextoSimple(xml, mapa) {
      let result = xml;
      for (const [key, value] of Object.entries(mapa)) {
        result = replaceAllSafe(result, `{{${key}}}`, escapeXml(value));
      }
      return result;
    }

    function reemplazarFilasCursos(xml, cursos) {
      const rowRegex = /<w:tr[\s\S]*?<\/w:tr>/g;
      const rows = xml.match(rowRegex);

      if (!rows || !rows.length) {
        throw new Error("No se pudieron leer las filas de la tabla del Word.");
      }

      const filasPlantilla = rows.filter(r =>
        r.includes("{{nombre}}") &&
        r.includes("{{p1}}") &&
        r.includes("{{p8}}") &&
        r.includes("{{promedio}}")
      );

      if (!filasPlantilla.length) {
        throw new Error("No se encontró la fila plantilla con {{nombre}}, {{p1}}...{{p8}}, {{promedio}}.");
      }

      const templateRow = filasPlantilla[0];

      const filasGeneradas = cursos.map(curso => {
        let row = templateRow;
        row = replaceAllSafe(row, "{{nombre}}", escapeXml(curso.nombre));
        row = replaceAllSafe(row, "{{p1}}", escapeXml(curso.p1));
        row = replaceAllSafe(row, "{{p2}}", escapeXml(curso.p2));
        row = replaceAllSafe(row, "{{p3}}", escapeXml(curso.p3));
        row = replaceAllSafe(row, "{{p4}}", escapeXml(curso.p4));
        row = replaceAllSafe(row, "{{p5}}", escapeXml(curso.p5));
        row = replaceAllSafe(row, "{{p6}}", escapeXml(curso.p6));
        row = replaceAllSafe(row, "{{p7}}", escapeXml(curso.p7));
        row = replaceAllSafe(row, "{{p8}}", escapeXml(curso.p8));
        row = replaceAllSafe(row, "{{promedio}}", escapeXml(curso.promedio));
        return row;
      }).join("");

      let nuevoXml = xml;

      filasPlantilla.forEach((fila, index) => {
        if (index === 0) {
          nuevoXml = nuevoXml.replace(fila, filasGeneradas);
        } else {
          nuevoXml = nuevoXml.replace(fila, "");
        }
      });

      return nuevoXml;
    }

    async function leerExcel() {
      if (typeof XLSX === "undefined") {
        throw new Error("No se cargó la librería XLSX.");
      }

      const excelFile = document.getElementById("excelFile").files[0];
      if (!excelFile) {
        throw new Error("Debe seleccionar el archivo Excel.");
      }

      log("Leyendo Excel...");
      const excelBuffer = await readFileAsArrayBuffer(excelFile);
      const workbook = XLSX.read(excelBuffer, { type: "array" });

      const datos = extraerDatosDesdeExcel(workbook);
      cacheDatosExcel = datos;

      document.getElementById("docenteInput").value = datos.docente;
      document.getElementById("carreraInput").value = datos.carrera;

      log(
        "Excel leído correctamente.\n\n" +
        "Docente: " + (datos.docente || "[no encontrado en el Excel]") + "\n" +
        "Carrera: " + (datos.carrera || "[no encontrada en el Excel]") + "\n" +
        "Cursos: " + datos.cursos.length + "\n" +
        "Promedio todas asignaturas / 5: " + datos.promedioTodasAsignaturas5 + "\n" +
        "Promedio total / 100: " + datos.promedioTotal100
      );
    }

    async function procesarWord() {
      if (typeof XLSX === "undefined") {
        throw new Error("No se cargó la librería XLSX.");
      }
      if (typeof PizZip === "undefined") {
        throw new Error("No se cargó la librería PizZip. Abra este HTML con internet.");
      }
      if (typeof saveAs === "undefined") {
        throw new Error("No se cargó la librería FileSaver. Abra este HTML con internet.");
      }

      const wordFile = document.getElementById("wordFile").files[0];
      if (!wordFile) {
        throw new Error("Debe seleccionar la plantilla Word.");
      }

      if (!cacheDatosExcel) {
        await leerExcel();
      }

      const docente = document.getElementById("docenteInput").value.trim();
      const carrera = document.getElementById("carreraInput").value.trim();

      if (!docente) {
        throw new Error("El campo Docente está vacío.");
      }
      if (!carrera) {
        throw new Error("El campo Carrera está vacío.");
      }

      const datos = {
        ...cacheDatosExcel,
        docente,
        carrera
      };

      log("Leyendo Word...");
      const wordBuffer = await readFileAsArrayBuffer(wordFile);

      const zip = new PizZip(wordBuffer);
      const documentFile = zip.file("word/document.xml");

      if (!documentFile) {
        throw new Error("No existe word/document.xml dentro del .docx.");
      }

      let documentXml = documentFile.asText();

      documentXml = reemplazarFilasCursos(documentXml, datos.cursos);

      documentXml = reemplazarTextoSimple(documentXml, {
        docente: datos.docente,
        carrera: datos.carrera,
        promedio_todas_asignaturas: datos.promedioTodasAsignaturas5,
        promedio_total_100: datos.promedioTotal100
      });

      documentXml = replaceAllSafe(documentXml, "PROMEDIO TODAS ASIGNATURAS / 5 PUNTOS", "PROMEDIO TODAS ASIGNATURAS / 5 PUNTOS");
      documentXml = replaceAllSafe(documentXml, "PROMEDIO TOTAL SOBRE 100 PUNTOS", "PROMEDIO TOTAL SOBRE 100 PUNTOS");

      zip.file("word/document.xml", documentXml);

      const output = zip.generate({
        type: "blob",
        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      });

      saveAs(output, "Informe_Evaluacion_Docente_Llenado.docx");

      log(
        "Proceso completado.\n\n" +
        "Se reemplazó:\n" +
        "- {{docente}} = " + datos.docente + "\n" +
        "- {{carrera}} = " + datos.carrera + "\n" +
        "- Tabla de cursos = " + datos.cursos.length + " fila(s)\n" +
        "- promedio_todas_asignaturas = " + datos.promedioTodasAsignaturas5 + "\n" +
        "- promedio_total_100 = " + datos.promedioTotal100 + "\n\n" +
        "Si en su Word esos dos promedios no están como {{promedio_todas_asignaturas}} y {{promedio_total_100}}, debe poner esos marcadores en la plantilla."
      );
    }

    document.getElementById("btnLeerExcel").addEventListener("click", async () => {
      try {
        await leerExcel();
      } catch (error) {
        console.error(error);
        log("Error:\n" + error.message);
      }
    });

    document.getElementById("btnProcesar").addEventListener("click", async () => {
      try {
        await procesarWord();
      } catch (error) {
        console.error(error);
        log("Error:\n" + error.message);
      }
    });
  </script>
</body>
</html>

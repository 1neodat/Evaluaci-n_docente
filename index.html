<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compilar Excel a HTML</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    h1, h2, h3 {
      margin-top: 28px;
    }
    .panel {
      border: 1px solid #ccc;
      padding: 16px;
      margin-bottom: 24px;
      background: #f8f8f8;
    }
    .ok {
      color: #0a7a0a;
      font-weight: bold;
    }
    .error {
      color: #b30000;
      font-weight: bold;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0 28px 0;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #999;
      padding: 6px;
      vertical-align: top;
      text-align: left;
    }
    th {
      background: #efefef;
    }
    .meta {
      background: #fafafa;
      border: 1px solid #ddd;
      padding: 8px;
      margin: 8px 0 16px 0;
      font-size: 13px;
    }
    button {
      padding: 10px 16px;
      cursor: pointer;
      margin-right: 8px;
    }
    #output {
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <h1>Compilador HTML de documentos Excel</h1>

  <div class="panel">
    <p>Seleccione estos tres archivos:</p>
    <ul>
      <li>Asistencia docente.xlsx</li>
      <li>Evaluación docente individual.xlsx</li>
      <li>Histórico evaluación docente Campus Loja - Intake 2 2025.xlsx</li>
    </ul>

    <input type="file" id="files" multiple accept=".xlsx,.xls" />
    <br /><br />
    <button onclick="procesarArchivos()">Compilar</button>
    <button onclick="descargarHTML()">Descargar HTML compilado</button>
    <div id="status"></div>
  </div>

  <div id="output"></div>

  <script>
    const nombresEsperados = [
      "Asistencia docente.xlsx",
      "Evaluación docente individual.xlsx",
      "Histórico evaluación docente Campus Loja - Intake 2 2025.xlsx"
    ];

    function escapeHTML(valor) {
      return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizarNombre(nombre) {
      return nombre.trim().toLowerCase();
    }

    async function leerArchivoComoArrayBuffer(file) {
      return await file.arrayBuffer();
    }

    function sheetToHTMLTable(data) {
      if (!data || !data.length) {
        return "<p><em>Hoja vacía</em></p>";
      }

      let html = "<table><tbody>";

      for (let i = 0; i < data.length; i++) {
        html += "<tr>";
        const fila = data[i] || [];
        for (let j = 0; j < fila.length; j++) {
          const valor = fila[j] ?? "";
          const tag = i === 0 ? "th" : "td";
          html += `<${tag}>${escapeHTML(valor)}</${tag}>`;
        }
        html += "</tr>";
      }

      html += "</tbody></table>";
      return html;
    }

    async function procesarArchivos() {
      const input = document.getElementById("files");
      const status = document.getElementById("status");
      const output = document.getElementById("output");
      output.innerHTML = "";
      status.innerHTML = "";

      const files = Array.from(input.files || []);
      if (files.length !== 3) {
        status.innerHTML = '<p class="error">Debe seleccionar exactamente 3 archivos.</p>';
        return;
      }

      const nombresRecibidos = files.map(f => normalizarNombre(f.name));
      const faltantes = nombresEsperados.filter(n => !nombresRecibidos.includes(normalizarNombre(n)));
      const sobrantes = files.filter(f => !nombresEsperados.map(normalizarNombre).includes(normalizarNombre(f.name)));

      if (faltantes.length || sobrantes.length) {
        status.innerHTML = `
          <p class="error">Los archivos no coinciden exactamente con los esperados.</p>
          <p><strong>Faltantes:</strong> ${faltantes.length ? faltantes.map(escapeHTML).join(", ") : "Ninguno"}</p>
          <p><strong>No válidos:</strong> ${sobrantes.length ? sobrantes.map(f => escapeHTML(f.name)).join(", ") : "Ninguno"}</p>
        `;
        return;
      }

      status.innerHTML = '<p class="ok">Procesando archivos...</p>';

      const ordenados = nombresEsperados.map(nombre =>
        files.find(f => normalizarNombre(f.name) === normalizarNombre(nombre))
      );

      let compilado = `
        <section>
          <h1>Compilado de documentos Excel</h1>
          <div class="meta">
            <strong>Archivos procesados:</strong><br>
            ${nombresEsperados.map(escapeHTML).join("<br>")}
          </div>
        </section>
      `;

      for (const file of ordenados) {
        const buffer = await leerArchivoComoArrayBuffer(file);
        const workbook = XLSX.read(buffer, { type: "array" });

        compilado += `<section>`;
        compilado += `<h2>${escapeHTML(file.name)}</h2>`;

        for (const sheetName of workbook.SheetNames) {
          const sheet = workbook.Sheets[sheetName];
          const data = XLSX.utils.sheet_to_json(sheet, {
            header: 1,
            defval: "",
            raw: false
          });

          const filas = data.length;
          const columnas = data.reduce((max, fila) => Math.max(max, (fila || []).length), 0);

          compilado += `<h3>Hoja: ${escapeHTML(sheetName)}</h3>`;
          compilado += `
            <div class="meta">
              <strong>Filas:</strong> ${filas} |
              <strong>Columnas:</strong> ${columnas}
            </div>
          `;
          compilado += sheetToHTMLTable(data);
        }

        compilado += `</section>`;
      }

      output.innerHTML = compilado;
      status.innerHTML = '<p class="ok">Compilación completada.</p>';
    }

    function descargarHTML() {
      const contenido = document.getElementById("output").innerHTML;

      if (!contenido.trim()) {
        document.getElementById("status").innerHTML = '<p class="error">Primero debe compilar los archivos.</p>';
        return;
      }

      const documentoCompleto = `
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Compilado de documentos Excel</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.4; }
    h1, h2, h3 { margin-top: 28px; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0 28px 0; font-size: 12px; }
    th, td { border: 1px solid #999; padding: 6px; vertical-align: top; text-align: left; }
    th { background: #efefef; }
    .meta { background: #fafafa; border: 1px solid #ddd; padding: 8px; margin: 8px 0 16px 0; font-size: 13px; }
  </style>
</head>
<body>
${contenido}
</body>
</html>`.trim();

      const blob = new Blob([documentoCompleto], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "compilado_documentos.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>

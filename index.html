<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generar informe docente</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; max-width: 960px; margin: 20px auto; padding: 0 16px; }
    h1 { font-size: 22px; }
    .box { border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
    label { display:block; margin:10px 0 6px; font-weight:bold; }
    input[type="file"], select, button { width:100%; padding:10px; box-sizing:border-box; }
    button { margin-top: 12px; cursor:pointer; }
    pre { background:#f5f5f5; padding:12px; border-radius:6px; white-space:pre-wrap; }
  </style>
</head>
<body>

  <h1>Generar informe docente</h1>

  <div class="box">
    <label for="excelFile">Excel</label>
    <input type="file" id="excelFile" accept=".xlsx,.xls" />

    <label for="wordFile">Word</label>
    <input type="file" id="wordFile" accept=".docx" />

    <button id="btnLeer">Leer Excel</button>
  </div>

  <div class="box">
    <label for="docenteSelect">Docente</label>
    <select id="docenteSelect" disabled>
      <option value="">Seleccione</option>
    </select>

    <label for="carreraSelect">Carrera</label>
    <select id="carreraSelect" disabled>
      <option value="">Seleccione</option>
    </select>

    <button id="btnGenerar" disabled>Generar Word</button>
  </div>

  <div class="box">
    <strong>Estado</strong>
    <pre id="log">Esperando...</pre>
  </div>

  <script>
    let registros = [];

    function log(msg) {
      document.getElementById("log").textContent = msg;
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsArrayBuffer(file);
      });
    }

    function txt(v) {
      return String(v ?? "").trim();
    }

    function fmt(n) {
      const x = Number(n);
      if (Number.isNaN(x)) return "";
      return x.toFixed(2).replace(".", ",");
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function repAll(text, find, repl) {
      return text.split(find).join(repl);
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function normal(s) {
      return txt(s).toUpperCase();
    }

    function leerExcelCompleto(workbook) {
      const salida = [];
      const mapa = new Map();

      workbook.SheetNames.forEach(sheetName => {
        const ws = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

        let docenteActual = "";
        let carreraActual = "";

        for (let i = 0; i < rows.length; i++) {
          const row = rows[i] || [];

          for (let c = 0; c < row.length; c++) {
            const valor = txt(row[c]);

            if (valor === "Docente:" || valor === "Docente") {
              const posible = txt(row[c + 1]);
              if (posible) docenteActual = posible;
            }

            if (
              valor === "Escuela:" || valor === "Escuela" ||
              valor === "Carrera:" || valor === "Carrera"
            ) {
              const posible = txt(row[c + 1]);
              if (posible) carreraActual = posible;
            }
          }

          const idxCurso = row.findIndex(v => txt(v) === "Curso:");
          if (idxCurso !== -1) {
            const nombreCurso = txt(row[idxCurso + 1]);

            if (!docenteActual || !carreraActual || !nombreCurso) continue;

            const notas = [];
            for (let k = i + 2; k <= i + 9; k++) {
              const num = Number(rows[k]?.[15]);
              if (!Number.isNaN(num)) notas.push(num);
            }

            if (notas.length !== 8) continue;

            const promedioN = notas.reduce((a, b) => a + b, 0) / 8;
            const clave = normal(docenteActual) + "||" + normal(carreraActual);

            if (!mapa.has(clave)) {
              mapa.set(clave, {
                sheetName,
                docente: docenteActual,
                carrera: carreraActual,
                cursos: []
              });
            }

            mapa.get(clave).cursos.push({
              nombre: nombreCurso,
              p1: fmt(notas[0]),
              p2: fmt(notas[1]),
              p3: fmt(notas[2]),
              p4: fmt(notas[3]),
              p5: fmt(notas[4]),
              p6: fmt(notas[5]),
              p7: fmt(notas[6]),
              p8: fmt(notas[7]),
              promedio: fmt(promedioN),
              promedioN
            });
          }
        }
      });

      for (const reg of mapa.values()) {
        if (!reg.cursos.length) continue;

        const promedioTodasN =
          reg.cursos.reduce((a, b) => a + b.promedioN, 0) / reg.cursos.length;

        salida.push({
          ...reg,
          promedio_todas_asignaturas: fmt(promedioTodasN),
          promedio_total_100: fmt(promedioTodasN * 20)
        });
      }

      return salida;
    }

    function cargarDocentes() {
      const sel = document.getElementById("docenteSelect");
      const docentes = unique(registros.map(x => x.docente)).sort((a, b) => a.localeCompare(b, "es"));
      sel.innerHTML = '<option value="">Seleccione</option>';

      docentes.forEach(d => {
        const op = document.createElement("option");
        op.value = d;
        op.textContent = d;
        sel.appendChild(op);
      });

      sel.disabled = docentes.length === 0;
    }

    function cargarCarreras(docente) {
      const sel = document.getElementById("carreraSelect");
      const carreras = unique(
        registros
          .filter(x => x.docente === docente)
          .map(x => x.carrera)
      ).sort((a, b) => a.localeCompare(b, "es"));

      sel.innerHTML = '<option value="">Seleccione</option>';

      carreras.forEach(c => {
        const op = document.createElement("option");
        op.value = c;
        op.textContent = c;
        sel.appendChild(op);
      });

      sel.disabled = carreras.length === 0;
      document.getElementById("btnGenerar").disabled = true;
    }

    function getRegistroSeleccionado() {
      const docente = document.getElementById("docenteSelect").value;
      const carrera = document.getElementById("carreraSelect").value;
      return registros.find(x => x.docente === docente && x.carrera === carrera) || null;
    }

    function reemplazarTablaCursos(xml, cursos) {
      const filas = xml.match(/<w:tr[\s\S]*?<\/w:tr>/g);
      if (!filas) throw new Error("No se pudieron leer las filas del Word.");

      const plantilla = filas.find(f =>
        f.includes("{{nombre}}") &&
        f.includes("{{p1}}") &&
        f.includes("{{p8}}") &&
        f.includes("{{promedio}}")
      );

      if (!plantilla) {
        throw new Error("No existe la fila plantilla con {{nombre}}, {{p1}} ... {{promedio}}.");
      }

      const generadas = cursos.map(c => {
        let f = plantilla;
        f = repAll(f, "{{nombre}}", esc(c.nombre));
        f = repAll(f, "{{p1}}", esc(c.p1));
        f = repAll(f, "{{p2}}", esc(c.p2));
        f = repAll(f, "{{p3}}", esc(c.p3));
        f = repAll(f, "{{p4}}", esc(c.p4));
        f = repAll(f, "{{p5}}", esc(c.p5));
        f = repAll(f, "{{p6}}", esc(c.p6));
        f = repAll(f, "{{p7}}", esc(c.p7));
        f = repAll(f, "{{p8}}", esc(c.p8));
        f = repAll(f, "{{promedio}}", esc(c.promedio));
        return f;
      }).join("");

      return xml.replace(plantilla, generadas);
    }

    function reemplazarTexto(xml, data) {
      let out = xml;
      for (const [k, v] of Object.entries(data)) {
        out = repAll(out, "{{" + k + "}}", esc(v));
      }
      return out;
    }

    document.getElementById("btnLeer").addEventListener("click", async () => {
      try {
        const excel = document.getElementById("excelFile").files[0];
        if (!excel) throw new Error("Seleccione el Excel.");

        const wb = XLSX.read(await readFile(excel), { type: "array" });
        registros = leerExcelCompleto(wb);

        if (!registros.length) {
          throw new Error("No se detectaron registros válidos en el Excel.");
        }

        cargarDocentes();

        log(
          "Excel leído correctamente.\n" +
          "Registros detectados: " + registros.length + "\n" +
          "Docentes detectados: " + unique(registros.map(r => r.docente)).length + "\n" +
          "Seleccione docente y carrera."
        );
      } catch (e) {
        log("Error:\n" + e.message);
      }
    });

    document.getElementById("docenteSelect").addEventListener("change", function () {
      cargarCarreras(this.value);
    });

    document.getElementById("carreraSelect").addEventListener("change", function () {
      const reg = getRegistroSeleccionado();
      document.getElementById("btnGenerar").disabled = !reg;

      if (reg) {
        log(
          "Selección lista.\n" +
          "Docente: " + reg.docente + "\n" +
          "Carrera: " + reg.carrera + "\n" +
          "Cursos: " + reg.cursos.length
        );
      }
    });

    document.getElementById("btnGenerar").addEventListener("click", async () => {
      try {
        const word = document.getElementById("wordFile").files[0];
        if (!word) throw new Error("Seleccione el Word.");

        const reg = getRegistroSeleccionado();
        if (!reg) throw new Error("Seleccione docente y carrera.");

        const zip = new PizZip(await readFile(word));
        let xml = zip.file("word/document.xml").asText();

        xml = reemplazarTablaCursos(xml, reg.cursos);
        xml = reemplazarTexto(xml, {
          docente: reg.docente,
          carrera: reg.carrera,
          promedio_todas_asignaturas: reg.promedio_todas_asignaturas,
          promedio_total_100: reg.promedio_total_100
        });

        zip.file("word/document.xml", xml);

        const blob = zip.generate({
          type: "blob",
          mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        });

        saveAs(blob, "Informe_" + reg.docente.replace(/[\\/:*?"<>|]+/g, "_") + ".docx");
        log("Documento generado correctamente.");
      } catch (e) {
        log("Error:\n" + e.message);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generar informe docente</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.7/pizzip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; }
    label { display:block; margin-top:10px; font-weight:bold; }
    select, input[type="file"], button { width:100%; padding:8px; margin-top:4px; box-sizing:border-box; }
    button { margin-top:14px; cursor:pointer; }
    pre { background:#f4f4f4; padding:10px; border-radius:6px; white-space:pre-wrap; }
  </style>
</head>
<body>

  <h2>Generar informe docente</h2>

  <label>Excel</label>
  <input type="file" id="excelFile" accept=".xlsx,.xls" />

  <label>Word</label>
  <input type="file" id="wordFile" accept=".docx" />

  <button id="btnLeer">Leer Excel</button>

  <label>Docente</label>
  <select id="docenteSelect" disabled>
    <option value="">Seleccione</option>
  </select>

  <label>Carrera</label>
  <select id="carreraSelect" disabled>
    <option value="">Seleccione</option>
  </select>

  <button id="btnGenerar" disabled>Generar Word</button>

  <h3>Estado</h3>
  <pre id="log">Esperando...</pre>

  <script>
    let registros = [];

    function log(msg) {
      document.getElementById("log").textContent = msg;
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsArrayBuffer(file);
      });
    }

    function txt(v) {
      return String(v ?? "").trim();
    }

    function fmt(n) {
      const x = Number(n);
      if (Number.isNaN(x)) return "";
      return x.toFixed(2).replace(".", ",");
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function repAll(text, find, repl) {
      return text.split(find).join(repl);
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function leerBloquesExcel(workbook) {
      const salida = [];

      workbook.SheetNames.forEach(sheetName => {
        const ws = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

        let docente = "";
        let carrera = "";

        for (let i = 0; i < rows.length; i++) {
          const r = rows[i] || [];
          if (txt(r[2]) === "Docente:") docente = txt(r[3]);
          if (txt(r[2]) === "Escuela:" || txt(r[2]) === "Carrera:") carrera = txt(r[3]);
        }

        if (!docente || !carrera) return;

        const cursos = [];

        for (let i = 0; i < rows.length; i++) {
          const r = rows[i] || [];
          if (txt(r[2]) === "Curso:" && txt(r[3]) !== "") {
            const nombre = txt(r[3]);

            const p1 = Number(rows[i + 2]?.[15]);
            const p2 = Number(rows[i + 3]?.[15]);
            const p3 = Number(rows[i + 4]?.[15]);
            const p4 = Number(rows[i + 5]?.[15]);
            const p5 = Number(rows[i + 6]?.[15]);
            const p6 = Number(rows[i + 7]?.[15]);
            const p7 = Number(rows[i + 8]?.[15]);
            const p8 = Number(rows[i + 9]?.[15]);

            const vals = [p1,p2,p3,p4,p5,p6,p7,p8];

            if (vals.every(v => !Number.isNaN(v))) {
              const promedioN = vals.reduce((a,b)=>a+b,0) / 8;
              cursos.push({
                nombre,
                p1: fmt(p1),
                p2: fmt(p2),
                p3: fmt(p3),
                p4: fmt(p4),
                p5: fmt(p5),
                p6: fmt(p6),
                p7: fmt(p7),
                p8: fmt(p8),
                promedio: fmt(promedioN),
                promedioN
              });
            }
          }
        }

        if (cursos.length) {
          const promedioTodasN = cursos.reduce((a,b)=>a+b.promedioN,0) / cursos.length;
          salida.push({
            sheetName,
            docente,
            carrera,
            cursos,
            promedio_todas_asignaturas: fmt(promedioTodasN),
            promedio_total_100: fmt(promedioTodasN * 20)
          });
        }
      });

      return salida;
    }

    function cargarDocentes() {
      const sel = document.getElementById("docenteSelect");
      const docentes = unique(registros.map(x => x.docente)).sort((a,b)=>a.localeCompare(b,"es"));
      sel.innerHTML = '<option value="">Seleccione</option>';
      docentes.forEach(d => {
        const op = document.createElement("option");
        op.value = d;
        op.textContent = d;
        sel.appendChild(op);
      });
      sel.disabled = docentes.length === 0;
    }

    function cargarCarreras(docente) {
      const sel = document.getElementById("carreraSelect");
      const carreras = unique(
        registros.filter(x => x.docente === docente).map(x => x.carrera)
      ).sort((a,b)=>a.localeCompare(b,"es"));
      sel.innerHTML = '<option value="">Seleccione</option>';
      carreras.forEach(c => {
        const op = document.createElement("option");
        op.value = c;
        op.textContent = c;
        sel.appendChild(op);
      });
      sel.disabled = carreras.length === 0;
      document.getElementById("btnGenerar").disabled = true;
    }

    function getRegistroSeleccionado() {
      const docente = document.getElementById("docenteSelect").value;
      const carrera = document.getElementById("carreraSelect").value;
      return registros.find(x => x.docente === docente && x.carrera === carrera) || null;
    }

    function reemplazarTablaCursos(xml, cursos) {
      const filas = xml.match(/<w:tr[\s\S]*?<\/w:tr>/g);
      if (!filas) throw new Error("No se pudieron leer las filas del Word.");

      const plantilla = filas.find(f =>
        f.includes("{{nombre}}") &&
        f.includes("{{p1}}") &&
        f.includes("{{p8}}") &&
        f.includes("{{promedio}}")
      );

      if (!plantilla) throw new Error("No existe la fila plantilla con {{nombre}}...{{promedio}}.");

      const generadas = cursos.map(c => {
        let f = plantilla;
        f = repAll(f, "{{nombre}}", esc(c.nombre));
        f = repAll(f, "{{p1}}", esc(c.p1));
        f = repAll(f, "{{p2}}", esc(c.p2));
        f = repAll(f, "{{p3}}", esc(c.p3));
        f = repAll(f, "{{p4}}", esc(c.p4));
        f = repAll(f, "{{p5}}", esc(c.p5));
        f = repAll(f, "{{p6}}", esc(c.p6));
        f = repAll(f, "{{p7}}", esc(c.p7));
        f = repAll(f, "{{p8}}", esc(c.p8));
        f = repAll(f, "{{promedio}}", esc(c.promedio));
        return f;
      }).join("");

      return xml.replace(plantilla, generadas);
    }

    function reemplazarTexto(xml, data) {
      let out = xml;
      Object.entries(data).forEach(([k,v]) => {
        out = repAll(out, "{{" + k + "}}", esc(v));
      });
      return out;
    }

    document.getElementById("btnLeer").addEventListener("click", async () => {
      try {
        if (typeof XLSX === "undefined") throw new Error("No cargó XLSX.");
        const file = document.getElementById("excelFile").files[0];
        if (!file) throw new Error("Seleccione el Excel.");

        const wb = XLSX.read(await readFile(file), { type: "array" });
        registros = leerBloquesExcel(wb);

        if (!registros.length) throw new Error("No se encontraron registros válidos.");

        cargarDocentes();
        log("Excel leído correctamente.\nSeleccione docente y carrera.");
      } catch (e) {
        log("Error:\n" + e.message);
      }
    });

    document.getElementById("docenteSelect").addEventListener("change", function () {
      cargarCarreras(this.value);
    });

    document.getElementById("carreraSelect").addEventListener("change", function () {
      const reg = getRegistroSeleccionado();
      document.getElementById("btnGenerar").disabled = !reg;
      if (reg) {
        log(
          "Selección lista:\n" +
          "Docente: " + reg.docente + "\n" +
          "Carrera: " + reg.carrera + "\n" +
          "Cursos: " + reg.cursos.length
        );
      }
    });

    document.getElementById("btnGenerar").addEventListener("click", async () => {
      try {
        if (typeof PizZip === "undefined") throw new Error("No cargó PizZip.");
        if (typeof saveAs === "undefined") throw new Error("No cargó FileSaver.");

        const word = document.getElementById("wordFile").files[0];
        if (!word) throw new Error("Seleccione el Word.");

        const reg = getRegistroSeleccionado();
        if (!reg) throw new Error("Seleccione docente y carrera.");

        const zip = new PizZip(await readFile(word));
        let xml = zip.file("word/document.xml").asText();

        xml = reemplazarTablaCursos(xml, reg.cursos);
        xml = reemplazarTexto(xml, {
          docente: reg.docente,
          carrera: reg.carrera,
          promedio_todas_asignaturas: reg.promedio_todas_asignaturas,
          promedio_total_100: reg.promedio_total_100
        });

        zip.file("word/document.xml", xml);

        const blob = zip.generate({
          type: "blob",
          mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        });

        saveAs(blob, "Informe_" + reg.docente.replace(/[\\/:*?"<>|]+/g, "_") + ".docx");
        log("Documento generado correctamente.");
      } catch (e) {
        log("Error:\n" + e.message);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador UIDE - Enlace Directo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001a33; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #003366; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #003366; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #0055a4; }
        .status { font-size: 12px; text-align: center; margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#003366;">Generador de Informes</h2>
    
    <div class="input-group">
        <label>1. Cargar Excel de Evaluación:</label>
        <input type="file" id="upExcel" accept=".xlsx">
    </div>

    <div class="input-group">
        <label>2. Cargar Plantilla Word:</label>
        <input type="file" id="upWord" accept=".docx">
    </div>

    <div id="formRecursos" style="display:none;">
        <label>Seleccione Carrera:</label>
        <select id="selCarrera" onchange="actualizarDocentes()"></select>

        <label>Seleccione Docente:</label>
        <select id="selDocente"></select>

        <button onclick="procesar()">GENERAR INFORME LLENO</button>
    </div>
    <div id="info" class="status">Cargue los archivos para comenzar</div>
</div>

<script>
let dataFilas = [];
let bufferPlantilla = null;

// Leer Excel
document.getElementById('upExcel').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = (evt) => {
        const wb = XLSX.read(new Uint8Array(evt.target.result), {type: 'array'});
        const sheet = wb.Sheets["BD"] || wb.Sheets[wb.SheetNames[0]];
        dataFilas = XLSX.utils.sheet_to_json(sheet);
        
        const carreras = [...new Set(dataFilas.map(f => f.Escuela).filter(Boolean))].sort();
        const combo = document.getElementById("selCarrera");
        combo.innerHTML = '<option value="">-- Carreras --</option>';
        carreras.forEach(c => combo.innerHTML += `<option value="${c}">${c}</option>`);
        verificarCarga();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

// Leer Word
document.getElementById('upWord').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = (evt) => {
        bufferPlantilla = evt.target.result;
        verificarCarga();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
});

function verificarCarga() {
    if(dataFilas.length > 0 && bufferPlantilla) {
        document.getElementById("formRecursos").style.display = "block";
        document.getElementById("info").innerText = "✅ Archivos listos para procesar";
    }
}

function actualizarDocentes() {
    const carrera = document.getElementById("selCarrera").value;
    const comboD = document.getElementById("selDocente");
    comboD.innerHTML = "";
    const filtrados = [...new Set(dataFilas.filter(f => f.Escuela === carrera).map(f => f.Docente))].sort();
    filtrados.forEach(d => comboD.innerHTML += `<option value="${d}">${d}</option>`);
}

async function procesar() {
    const docenteNombre = document.getElementById("selDocente").value;
    const registro = dataFilas.find(f => f.Docente === docenteNombre);

    try {
        const zip = new PizZip(bufferPlantilla);
        const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

        // Convertir promedio de base 5 a base 100
        const notaFinal = (parseFloat(registro.Promedio) * 20).toFixed(2);

        // MAPEO DE DATOS A LAS LLAVES {{ }}
        doc.render({
            docente: registro.Docente,
            carrera: registro.Escuela,
            ev100: notaFinal,
            total100: notaFinal,
            escala: notaFinal >= 85 ? "Excelente" : (notaFinal >= 70 ? "Muy buena" : "Regular")
        });

        const out = doc.getZip().generate({type: "blob"});
        saveAs(out, `Informe_${docenteNombre.replace(/ /g, "_")}.docx`);
        
    } catch (error) {
        alert("Error: Asegúrate de que el Word tenga las etiquetas {{docente}}, {{ev100}}, etc.");
    }
}
</script>
</body>
</html>

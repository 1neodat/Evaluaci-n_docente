<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador UIDE Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001a33; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #003366; text-align: center; margin-bottom: 25px; border-bottom: 3px solid #b8962d; padding-bottom: 10px; }
        .step { background: #f4f7f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        label { font-weight: bold; color: #003366; display: block; margin-bottom: 5px; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; font-size: 14px; }
        button { background: #b8962d; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #9a7d25; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="card">
    <h2>Generador UIDE</h2>
    
    <div class="step">
        <label>1. Archivo Excel (Datos):</label>
        <input type="file" id="xl" accept=".xlsx" style="width:100%">
    </div>

    <div class="step">
        <label>2. Plantilla Word:</label>
        <input type="file" id="wd" accept=".docx" style="width:100%">
    </div>

    <div id="active" style="display:none">
        <div class="step">
            <label>Carrera:</label>
            <select id="sc" onchange="updD()"></select>
            <label style="margin-top:10px">Docente:</label>
            <select id="sd"></select>
        </div>
        <button onclick="run()">DESCARGAR INFORME LLENO</button>
    </div>
</div>

<script>
let db = [];
let tpl = null;

document.getElementById('xl').onchange = function(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        const b = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
        const s = b.Sheets["Eval docente individual"] || b.Sheets[b.SheetNames[0]];
        db = XLSX.utils.sheet_to_json(s);
        const cats = [...new Set(db.map(x => x.Escuela).filter(Boolean))].sort();
        document.getElementById('sc').innerHTML = '<option value="">-- Elige Carrera --</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        check();
    };
    r.readAsArrayBuffer(e.target.files[0]);
};

document.getElementById('wd').onchange = function(e) {
    const r = new FileReader();
    r.onload = (ev) => { tpl = ev.target.result; check(); };
    r.readAsArrayBuffer(e.target.files[0]);
};

function check() { if(db.length && tpl) document.getElementById('active').style.display='block'; }

function updD() {
    const c = document.getElementById('sc').value;
    const ds = [...new Set(db.filter(x => x.Escuela === c).map(x => x.Docente))].sort();
    document.getElementById('sd').innerHTML = ds.map(d => `<option value="${d}">${d}</option>`).join('');
}

function run() {
    const dName = document.getElementById('sd').value;
    const cName = document.getElementById('sc').value;
    const rows = db.filter(x => x.Docente === dName);

    // Preparar lista de asignaturas (Imagen 2)
    const asignaturas = rows.map(m => ({
        nombre: m.Asignatura || m.Curso || "S/N",
        p1: Number(m.P1 || 0).toFixed(2),
        p2: Number(m.P2 || 0).toFixed(2),
        p3: Number(m.P3 || 0).toFixed(2),
        p4: Number(m.P4 || 0).toFixed(2),
        p5: Number(m.P5 || 0).toFixed(2),
        p6: Number(m.P6 || 0).toFixed(2),
        p7: Number(m.P7 || 0).toFixed(2),
        p8: Number(m.P8 || 0).toFixed(2),
        promedio: Number(m.Promedio || 0).toFixed(2)
    }));

    // Cálculo final basado en promedio de materias
    const avg = asignaturas.reduce((a, b) => a + parseFloat(b.promedio), 0) / asignaturas.length;
    const n100 = (avg * 20).toFixed(2);

    try {
        const zip = new PizZip(tpl);
        const doc = new window.docxtemplater(zip, { 
            paragraphLoop: true, 
            linebreaks: true,
            delimiters: {start: '{{', end: '}}'} // Forzar detección limpia
        });

        doc.render({
            docente: dName,
            carrera: cName,
            asignaturas: asignaturas,
            ev100: n100,
            total100: n100,
            escala: n100 >= 85 ? "Excelente" : (n100 >= 70 ? "Muy buena" : "Regular")
        });

        const out = doc.getZip().generate({type: "blob"});
        saveAs(out, `Informe_UIDE_${dName}.docx`);
    } catch (e) {
        alert("Error: Asegúrate de que las llaves {{ }} no tengan formatos diferentes dentro del Word.");
    }
}
</script>
</body>
</html>
